services:
  - type: web
    name: kazi-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: kazi-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 30d
      - key: GEMINI_API_KEY
        sync: false          # you set this manually in Render dashboard
      - key: ADMIN_API_KEY
        generateValue: true  # Render auto-generates; copy from dashboard
      - key: SUPER_ADMIN_EMAIL
        sync: false          # your admin email
      - key: FRONTEND_URL
        value: https://kazi-agent.vercel.app
      - key: MPESA_ENV
        value: sandbox

databases:
  - name: kazi-db
    plan: free
    databaseName: kazi
    user: kazi
