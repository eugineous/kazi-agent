<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="50%" stop-color="#00b4d8"/>
      <stop offset="100%" stop-color="#0077ff"/>
    </linearGradient>
    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#0077ff" stop-opacity="0.4"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bgGrad)"/>

  <!-- Subtle inner border glow -->
  <rect x="6" y="6" width="500" height="500" rx="92" fill="none"
        stroke="url(#cyanGrad)" stroke-width="3" opacity="0.35"/>

  <!-- Ambient glow behind K -->
  <ellipse cx="260" cy="256" rx="160" ry="160" fill="#00b4d8" opacity="0.06"/>

  <!-- ═══ LETTER K ═══ -->
  <!-- Left vertical bar -->
  <rect x="108" y="100" width="72" height="312" rx="14"
        fill="url(#cyanGrad)" filter="url(#glow)"/>

  <!-- Upper diagonal arm: from center of left bar to upper-right -->
  <polygon points="180,256 180,212 402,100 402,154"
           fill="url(#cyanGrad)" filter="url(#glow)"/>

  <!-- Lower diagonal arm: from center of left bar to lower-right -->
  <polygon points="180,256 180,300 402,412 402,358"
           fill="url(#cyanGrad)" filter="url(#glow)"/>

  <!-- ═══ LIGHTNING BOLT ACCENT ═══ (inside the K opening) -->
  <polygon points="290,210 268,276 284,276 262,342 308,268 290,268 314,210"
           fill="url(#boltGrad)" opacity="0.75" filter="url(#softglow)"/>

  <!-- Small decorative dots -->
  <circle cx="450" cy="104" r="8" fill="#00e5ff" opacity="0.4"/>
  <circle cx="462" cy="124" r="4" fill="#00e5ff" opacity="0.25"/>
  <circle cx="62" cy="408" r="8" fill="#00e5ff" opacity="0.4"/>
  <circle cx="50" cy="388" r="4" fill="#00e5ff" opacity="0.25"/>
</svg>
