<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'unsafe-inline';">
<title>Kazi · PiP</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0a0d12;
    --surface:   #111419;
    --border:    #1e2430;
    --accent:    #00d9ff;
    --accent-2:  #7c3aed;
    --text:      #e2e8f0;
    --muted:     #64748b;
    --user-bg:   #0f1f3d;
    --agent-bg:  #111419;
    --danger:    #f85149;
    --ok:        #3fb950;
    --radius:    10px;
    --drag:      -webkit-app-region: drag;
    --no-drag:   -webkit-app-region: no-drag;
  }

  html, body {
    height: 100%;
    overflow: hidden;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    font-size: 13px;
    background: var(--bg);
    color: var(--text);
    user-select: none;
  }

  /* ── Titlebar ─────────────────────────────────────── */
  #titlebar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 36px;
    padding: 0 8px 0 10px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    -webkit-app-region: drag;
    flex-shrink: 0;
  }
  .tb-left {
    display: flex;
    align-items: center;
    gap: 6px;
    pointer-events: none;
  }
  .tb-icon {
    width: 16px; height: 16px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px;
  }
  .tb-title {
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .tb-badge {
    font-size: 9px;
    padding: 1px 5px;
    border-radius: 8px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    color: #000;
    font-weight: 700;
    letter-spacing: 0.04em;
  }
  .tb-controls {
    display: flex;
    align-items: center;
    gap: 2px;
    -webkit-app-region: no-drag;
  }
  .tb-btn {
    width: 26px; height: 26px;
    border: none;
    background: transparent;
    color: var(--muted);
    border-radius: 5px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, color 0.15s;
    font-size: 12px;
  }
  .tb-btn:hover { background: rgba(255,255,255,0.07); color: var(--text); }
  .tb-btn.close:hover { background: rgba(248,81,73,0.18); color: var(--danger); }
  .tb-btn svg { width: 10px; height: 10px; }

  /* ── Status bar ───────────────────────────────────── */
  #status-bar {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .st-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s;
    flex-shrink: 0;
  }
  .st-dot.ready { background: var(--ok); box-shadow: 0 0 4px var(--ok); }
  .st-dot.load  { background: var(--accent); animation: pulse 1.2s infinite; }
  .st-dot.warn  { background: #f0a500; }
  .st-dot.err   { background: var(--danger); }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.35; } }
  #st-text {
    font-size: 10px;
    color: var(--muted);
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ── Messages ─────────────────────────────────────── */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 8px 8px 4px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    scroll-behavior: smooth;
  }
  #messages::-webkit-scrollbar { width: 3px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg {
    display: flex;
    flex-direction: column;
    gap: 2px;
    max-width: 100%;
  }
  .msg-label {
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--muted);
    padding: 0 4px;
  }
  .msg.user .msg-label { color: var(--accent); }
  .msg-bubble {
    padding: 6px 10px;
    border-radius: var(--radius);
    font-size: 12px;
    line-height: 1.5;
    word-break: break-word;
    white-space: pre-wrap;
    user-select: text;
  }
  .msg.user .msg-bubble {
    background: var(--user-bg);
    border: 1px solid rgba(0,217,255,0.15);
    color: var(--text);
    border-bottom-right-radius: 3px;
  }
  .msg.agent .msg-bubble {
    background: var(--agent-bg);
    border: 1px solid var(--border);
    color: var(--text);
    border-bottom-left-radius: 3px;
  }
  .msg.system .msg-bubble {
    background: transparent;
    border: none;
    color: var(--muted);
    font-size: 11px;
    font-style: italic;
    text-align: center;
  }

  /* thinking dots */
  .thinking { display: flex; align-items: center; gap: 3px; padding: 8px 10px; }
  .thinking span {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--accent);
    opacity: 0.5;
    animation: blink 1.2s infinite;
  }
  .thinking span:nth-child(2) { animation-delay: 0.2s; }
  .thinking span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,100% { opacity:0.2; } 50% { opacity:1; } }

  /* ── Empty state ──────────────────────────────────── */
  #empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 20px;
    color: var(--muted);
    text-align: center;
    pointer-events: none;
  }
  #empty .empty-icon { font-size: 28px; opacity: 0.4; }
  #empty p { font-size: 11px; line-height: 1.5; }

  /* ── Layout wrapper ───────────────────────────────── */
  #layout {
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  /* ── Input area ───────────────────────────────────── */
  #input-area {
    display: flex;
    align-items: flex-end;
    gap: 6px;
    padding: 8px 8px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  #cmd-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 12px;
    font-family: inherit;
    padding: 7px 10px;
    resize: none;
    outline: none;
    line-height: 1.45;
    max-height: 80px;
    transition: border-color 0.15s;
    -webkit-app-region: no-drag;
    user-select: text;
  }
  #cmd-input:focus { border-color: var(--accent); }
  #cmd-input::placeholder { color: var(--muted); }

  #send-btn {
    width: 32px; height: 32px;
    flex-shrink: 0;
    border: none;
    border-radius: 8px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    color: #000;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: opacity 0.15s, transform 0.1s;
    -webkit-app-region: no-drag;
  }
  #send-btn:hover { opacity: 0.85; transform: scale(1.05); }
  #send-btn:active { transform: scale(0.95); }
  #send-btn:disabled { opacity: 0.35; pointer-events: none; }
  #send-btn svg { width: 14px; height: 14px; }
</style>
</head>
<body>
<div id="layout">

  <!-- Titlebar -->
  <div id="titlebar">
    <div class="tb-left">
      <div class="tb-icon">⚡</div>
      <span class="tb-title">Kazi</span>
      <span class="tb-badge">PiP</span>
    </div>
    <div class="tb-controls">
      <!-- Detach to main window -->
      <button class="tb-btn" id="btn-open-main" title="Open main window">
        <svg viewBox="0 0 10 10" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M1 9 L9 1 M4 1 H9 V6" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <!-- Close PiP -->
      <button class="tb-btn close" id="btn-close" title="Close PiP">
        <svg viewBox="0 0 10 10" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M1 1 L9 9 M9 1 L1 9" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Status -->
  <div id="status-bar">
    <div class="st-dot load" id="st-dot"></div>
    <span id="st-text">Connecting…</span>
  </div>

  <!-- Messages -->
  <div id="messages">
    <div id="empty">
      <div class="empty-icon">💬</div>
      <p>Your conversation will appear here.<br>Send a command below.</p>
    </div>
  </div>

  <!-- Input -->
  <div id="input-area">
    <textarea id="cmd-input" placeholder="Ask Kazi anything…" rows="1"></textarea>
    <button id="send-btn" title="Send (Enter)">
      <svg viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M1 7 L13 7 M8 2 L13 7 L8 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>

</div>

<script>
  'use strict';

  const $ = id => document.getElementById(id);

  const dot     = $('st-dot');
  const stText  = $('st-text');
  const msgs    = $('messages');
  const emptyEl = $('empty');
  const input   = $('cmd-input');
  const sendBtn = $('send-btn');

  let agentReady = false;

  // ── Helpers ────────────────────────────────────────────────────────────────
  function setStatus(text, state = 'idle') {
    if (stText) stText.textContent = text;
    if (dot) {
      dot.className = 'st-dot';
      if (state === 'ready')   dot.classList.add('ready');
      if (state === 'loading') dot.classList.add('load');
      if (state === 'warn')    dot.classList.add('warn');
      if (state === 'error')   dot.classList.add('err');
    }
  }

  function addMsg(text, role = 'agent') {
    // Remove empty state
    if (emptyEl) emptyEl.style.display = 'none';

    const div = document.createElement('div');
    div.className = `msg ${role}`;
    div.innerHTML = `
      <span class="msg-label">${role === 'user' ? 'You' : role === 'agent' ? 'Kazi' : ''}</span>
      <div class="msg-bubble">${escHtml(text)}</div>
    `;
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
    return div;
  }

  function escHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/\n/g, '<br>');
  }

  function showThinking() {
    if (emptyEl) emptyEl.style.display = 'none';
    const div = document.createElement('div');
    div.className = 'msg agent';
    div.id = 'thinking-bubble';
    div.innerHTML = `
      <span class="msg-label">Kazi</span>
      <div class="msg-bubble">
        <div class="thinking">
          <span></span><span></span><span></span>
        </div>
      </div>
    `;
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
    return div;
  }

  function removeThinking() {
    const el = document.getElementById('thinking-bubble');
    if (el) el.remove();
  }

  // Auto-resize textarea
  function autoResize() {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 80) + 'px';
  }

  // ── IPC listeners ──────────────────────────────────────────────────────────
  if (window.kazi) {
    // Agent status updates
    window.kazi.agent.onStatus((status) => {
      if (status === 'ready') {
        agentReady = true;
        sendBtn.disabled = false;
        setStatus('Agent ready', 'ready');
      } else if (status === 'disconnected') {
        agentReady = false;
        sendBtn.disabled = true;
        setStatus('Reconnecting…', 'warn');
      } else if (status === 'error:nopython') {
        setStatus('Python not found', 'error');
        addMsg('⚠ Python not detected. Please check your installation.', 'system');
      } else if (status === 'error:nodeps') {
        setStatus('Missing dependencies', 'error');
        addMsg('⚠ Python packages missing. Run: pip install -r requirements.txt', 'system');
      } else if (status === 'error:nokey') {
        setStatus('No API key', 'error');
        addMsg('⚠ No Gemini API key. Add one in main window Settings.', 'system');
      } else {
        setStatus(status, 'loading');
      }
    });

    // Agent responses
    window.kazi.agent.onResponse((text) => {
      removeThinking();
      if (text.startsWith('[ERROR]')) {
        addMsg(text.replace('[ERROR]', '').trim(), 'system');
        setStatus('Error', 'error');
      } else {
        addMsg(text, 'agent');
        setStatus('Agent ready', 'ready');
      }
      sendBtn.disabled = !agentReady;
    });

    // PiP state from main window (if main window closes PiP)
    if (window.kazi.window && window.kazi.window.onPip) {
      window.kazi.window.onPip((open) => {
        if (!open) window.close();
      });
    }
  } else {
    // Fallback: not in Electron context
    setStatus('Not in Electron', 'error');
    addMsg('⚠ PiP only works inside the Kazi app.', 'system');
    sendBtn.disabled = true;
  }

  // ── Send command ───────────────────────────────────────────────────────────
  function sendCommand() {
    const text = input.value.trim();
    if (!text || !agentReady || sendBtn.disabled) return;

    addMsg(text, 'user');
    showThinking();
    sendBtn.disabled = true;
    setStatus('Thinking…', 'loading');

    if (window.kazi) {
      window.kazi.agent.sendCommand(text);
    }

    input.value = '';
    autoResize();
  }

  sendBtn.addEventListener('click', sendCommand);

  input.addEventListener('input', autoResize);
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendCommand();
    }
  });

  // ── Window controls ────────────────────────────────────────────────────────
  // Close PiP window — use togglePiP() so main window gets pip:state notification
  $('btn-close').addEventListener('click', () => {
    if (window.kazi) window.kazi.window.pip();
    else window.close();
  });

  // Open / focus main window, then close PiP
  $('btn-open-main').addEventListener('click', () => {
    if (window.kazi) {
      window.kazi.window.show();   // bring main window to front
      window.kazi.window.pip();    // close pip (togglePiP will close since it's open)
    } else {
      window.close();
    }
  });

  // ── Init ───────────────────────────────────────────────────────────────────
  // Check if agent is already ready (page loaded after agent started)
  setStatus('Connecting…', 'loading');
  sendBtn.disabled = true;

  // Focus input
  input.focus();
</script>
</body>
</html>
