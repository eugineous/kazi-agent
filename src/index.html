<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kazi Agent</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #fff;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-radius: 12px;
    }
    
    .titlebar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      background: rgba(0,0,0,0.3);
      -webkit-app-region: drag;
    }
    
    .titlebar h1 {
      font-size: 16px;
      font-weight: 600;
      color: #00d9ff;
    }
    
    .titlebar button {
      -webkit-app-region: no-drag;
      background: none;
      border: none;
      color: #888;
      cursor: pointer;
      font-size: 18px;
      padding: 4px 8px;
    }
    
    .titlebar button:hover {
      color: #fff;
    }
    
    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    .message {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.4;
    }
    
    .message.user {
      align-self: flex-end;
      background: #00d9ff;
      color: #000;
    }
    
    .message.agent {
      align-self: flex-start;
      background: rgba(255,255,255,0.1);
      color: #fff;
    }
    
    .message.status {
      align-self: center;
      background: rgba(255,193,7,0.2);
      color: #ffc107;
      font-size: 12px;
    }
    
    .input-container {
      padding: 16px;
      background: rgba(0,0,0,0.3);
      display: flex;
      gap: 8px;
    }
    
    #commandInput {
      flex: 1;
      padding: 12px 16px;
      border: none;
      border-radius: 24px;
      background: rgba(255,255,255,0.1);
      color: #fff;
      font-size: 14px;
      outline: none;
    }
    
    #commandInput::placeholder {
      color: #888;
    }
    
    #sendBtn {
      padding: 12px 20px;
      border: none;
      border-radius: 24px;
      background: #00d9ff;
      color: #000;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s;
    }
    
    #sendBtn:hover {
      transform: scale(1.05);
    }
    
    #sendBtn:active {
      transform: scale(0.95);
    }
    
    .status-bar {
      padding: 8px 16px;
      background: rgba(0,0,0,0.2);
      font-size: 11px;
      color: #888;
      display: flex;
      justify-content: space-between;
    }
    
    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4caf50;
      margin-right: 6px;
    }
  </style>
</head>
<body>
  <div class="titlebar">
    <h1>⚡ KAZI</h1>
    <button onclick="window.kazi.minimize()">—</button>
  </div>
  
  <div class="chat-container" id="chatContainer">
    <div class="message agent">
      Hey! I'm Kazi, your AI desktop agent. Tell me what to do and I'll handle it. 🚀
    </div>
  </div>
  
  <div class="input-container">
    <input type="text" id="commandInput" placeholder="Tell me what to do..." autofocus>
    <button id="sendBtn">Send</button>
  </div>
  
  <div class="status-bar">
    <span><span class="status-dot"></span>Ready</span>
    <span id="tokenCount">Tokens: 0 / 10,000</span>
  </div>
  
  <script src="renderer.js"></script>
</body>
</html>
